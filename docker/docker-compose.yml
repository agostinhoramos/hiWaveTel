# hiWaveTel: Docker Compose ModemManager + Django privileged container + TTY/USB.
#
# Host network (`network_mode: host`) lets ModemManager see `wwan0` / QMI net devices in the same
# namespace — avoids failures such as “Failed to find a net port in the QMI modem” on Docker bridge.
# With host network, `ports:` cannot be used (Compose ignores it). Gunicorn binds on the host at
# HIWAVE_PORT from ../.env (see docker/.env.example). Example LAN URL: http://192.168.1.65:5202/
#
# Read-only sysfs USB (`/sys/bus/usb`) aids ModemManager/udev enumeration and debugging; safe as `:ro`.
# Remove that volume entry if your policy forbids sysfs visibility.
#
# Quectel EC25 in QMI mode: set MODEM_QMI_DEVICE=/dev/cdc-wdm0 in `.env`.
#
# Stop the host ModemManager before starting this container:
#   sudo systemctl stop ModemManager NetworkManager
#
services:
  hiwavetel:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hiwavetel
    privileged: true
    network_mode: host
    env_file:
      - ../.env
    environment:
      DJANGO_ENV: "${DJANGO_ENV:-development}"
      # DJANGO_ALLOWED_HOSTS: only from env_file ../.env — not duplicated here, because
      # Compose interpolates ${VAR} from the project-directory .env (often docker/.env),
      # which would override the repo-root .env and keep the fallback localhost,127.0.0.1.
      DJANGO_LOG_DIR: "${DJANGO_LOG_DIR:-/app/logs}"
      DJANGO_LOG_FILE: "${DJANGO_LOG_FILE:-hiwavetel-api.log}"
      APPLICATION_LOG_LEVEL: "${APPLICATION_LOG_LEVEL:-INFO}"
      # HIWAVE_PORT: omit here — comes from env_file ../.env only (Compose ${VAR} does not read env_file).
      # Bind-mount project root as /app/host so db.sqlite3 can be created automatically (file bind-mounts fail when missing).
      SQLITE_DB_PATH: "${SQLITE_DB_PATH:-/app/host/db.sqlite3}"
      # SQLite concurrency: busy timeout + WAL + inbound persist retries (SMS queue + HTTP).
      SQLITE_BUSY_TIMEOUT_SEC: "${SQLITE_BUSY_TIMEOUT_SEC:-30}"
      SQLITE_INIT_WAL: "${SQLITE_INIT_WAL:-true}"
      SQLITE_SYNCHRONOUS_NORMAL: "${SQLITE_SYNCHRONOUS_NORMAL:-true}"
      SQLITE_LOCKED_RETRY_COUNT: "${SQLITE_LOCKED_RETRY_COUNT:-15}"
      SQLITE_LOCKED_RETRY_BACKOFF_SEC: "${SQLITE_LOCKED_RETRY_BACKOFF_SEC:-0.02}"
      RUN_SMS_WATCHER: "${RUN_SMS_WATCHER:-true}"
      RUN_MQTT_GATEWAY: "${RUN_MQTT_GATEWAY:-true}"
      MODEM_TTY_PRIMARY: "${MODEM_TTY_PRIMARY:-/dev/ttyUSB2}"
      MODEM_TTY_SECONDARY: "${MODEM_TTY_SECONDARY:-/dev/ttyUSB3}"
      MODEM_LTE_INTERFACE: "${MODEM_LTE_INTERFACE:-wwan0}"
      MODEM_STRICT_WWAN_CHECK: "${MODEM_STRICT_WWAN_CHECK:-false}"
      MODEM_ENUMERATION_WAIT_SEC: "${MODEM_ENUMERATION_WAIT_SEC:-60}"
      MODEM_ENABLE_WAIT_SEC: "${MODEM_ENABLE_WAIT_SEC:-45}"
      MMCLI_SCAN_TRIES: "${MMCLI_SCAN_TRIES:-1}"
      MMCLI_SCAN_SLEEP_SEC: "${MMCLI_SCAN_SLEEP_SEC:-1}"
      MODEM_QMI_DEVICE: "${MODEM_QMI_DEVICE:-/dev/cdc-wdm0}"
      MODEM_MANAGER_DEBUG: "${MODEM_MANAGER_DEBUG:-false}"
      # When AUTO_DETECT_MMCLI_INDEX=true and a modem was found, the entrypoint sets MODEM_MMCLI_INDEX from mmcli -L (Modem/N path).
      AUTO_DETECT_MMCLI_INDEX: "${AUTO_DETECT_MMCLI_INDEX:-true}"
      MODEM_MMCLI_INDEX: "${MODEM_MMCLI_INDEX:-0}"
      MQTT_EXTERNAL_TOPIC_PREFIX: "${MQTT_EXTERNAL_TOPIC_PREFIX:-hidishelink_dev}"
      MQTT_BASE_TOPIC_PREFIX: "${MQTT_BASE_TOPIC_PREFIX:-}"
      MQTT_DEVICE_TOPIC_PREFIX: "${MQTT_DEVICE_TOPIC_PREFIX:-}"
      # Modem SMS → MQTT: broadcast = {prefix}/modems/N/sms/inbox_delivery (one message); per_device = per-device topic
      MQTT_PUBLISH_MODEM_INBOX: "${MQTT_PUBLISH_MODEM_INBOX:-true}"
      MQTT_PUBLISH_SEND_REQUEST: "${MQTT_PUBLISH_SEND_REQUEST:-true}"
      MQTT_MODEM_INBOX_DELIVERY_MODE: "${MQTT_MODEM_INBOX_DELIVERY_MODE:-broadcast}"
      MQTT_MODEM_STATUS_SUBSCRIBE: "${MQTT_MODEM_STATUS_SUBSCRIBE:-true}"
      MQTT_MODEM_STATUS_COMMAND_TIMEOUT_SEC: "${MQTT_MODEM_STATUS_COMMAND_TIMEOUT_SEC:-45}"
      # After MQTT connect/reconnect: publish {prefix}/modems/N/status/telemetry; poll modem state changes when POLL_INTERVAL_SEC>0.
      MQTT_MODEM_STATUS_AUTO_PUBLISH: "${MQTT_MODEM_STATUS_AUTO_PUBLISH:-true}"
      MQTT_MODEM_STATUS_POLL_INTERVAL_SEC: "${MQTT_MODEM_STATUS_POLL_INTERVAL_SEC:-30}"
      SMS_QUEUE_WORKERS: "${SMS_QUEUE_WORKERS:-3}"
      SMS_QUEUE_MAX_SIZE: "${SMS_QUEUE_MAX_SIZE:-1000}"
    volumes:
      - ..:/app/host:rw
      - ../logs:/app/logs
      - /sys/bus/usb:/sys/bus/usb:ro
    # ttyUSB2: AT SMS; ttyUSB3: AT backup; cdc-wdm0: QMI (required for QMI ModemManager).
    devices:
      - "${MODEM_TTY_PRIMARY:-/dev/ttyUSB2}:${MODEM_TTY_PRIMARY:-/dev/ttyUSB2}"
      - "${MODEM_TTY_SECONDARY:-/dev/ttyUSB3}:${MODEM_TTY_SECONDARY:-/dev/ttyUSB3}"
      - "${MODEM_QMI_DEVICE:-/dev/cdc-wdm0}:${MODEM_QMI_DEVICE:-/dev/cdc-wdm0}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://127.0.0.1:$${HIWAVE_PORT:-8000}/api/health/ >/dev/null || exit 1",
        ]
      interval: 35s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
